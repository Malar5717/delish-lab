<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="script.js" defer></script>
</head>
<body>

    <div class="chimney">
        <div class="pipe"></div>
        <div class="hood"></div>
    </div>
    
    <div class="front">

        <!-- FRIDGE -->
        <div class="fridge">

            <div class="door top">
                <p class="hold">|</p>
            </div>
            <div class="door bottom">
                <p class="hold">|</p>
            </div>

            <div class="inside">
                <div class="shelf top"></div>
                <div class="shelf bottom">
                    <div class="sh"></div>
                    <div class="sh"></div>
                    <div class="sh"></div>
                </div>
            </div> 
            
        </div>
        
        <!-- COUNTER -->
        <div class="counter">

            <div class="faucet">
                <div class="tap"></div>
            </div>
            <div class="sink">
                <div class="cabinet left">
                    <p class="hold2">|</p>
                </div>
                <div class="cabinet right">
                    <p class="hold2">|</p>
                </div>
            </div>
            <div class="cabinet inside"></div>

            <div class="pot">
                 <p>_</p>
                 <p>_______</p>
                <div class="base"></div>
            </div>
            <div class="cook">
                <div class="handles">
                    <div class="dial small"></div>
                    <div class="dial small"></div>
                    <div class="dial small"></div>
                    <div class="dial large"></div>
                </div>
                <div class="otg"></div>
            </div>

            <div class="storage">
                <div class="cabinet"> <p class="hold4">|</p> </div>
                <div class="drawer">
                    <div class="d">
                        <p class="hold3">__</p>  
                        <i class="fa-solid fa-utensils"></i> <i class="fa-solid fa-spoon"></i> 
                    </div>
                    <div class="d"> 
                        <p class="hold3">__</p>
                    </div>
                    <div class="d"> <p class="hold3">__</p> </div>
                </div>
            </div>

        </div>

        <div class="bin"></div>

    </div>

    <!-- <div class="controls">
        <button id="fridgeBtn"> </button>
        <button id="ovenBtn"> </button>
        <button id="stoveBtn"> </button>
    </div> -->

    <div class="recipe-card">
        <div class="description"></div>
        <div class="instruction"></div>
    </div>

</body>
</html>
