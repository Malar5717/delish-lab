<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="styles.css">

</head>
<body>

                <p class="hold">|</p>
            </div>
            <div class="door bottom">
                <p class="hold">|</p>
            </div>

            <div class="inside">
                <div class="shelf top"></div>
                <div class="shelf bottom">
                    <div class="sh"></div>
                    <div class="sh"></div>
                    <div class="sh"></div>
                </div>
            </div> 
            
        </div>

        <div class="counter">

            <div class="sink">
                
                <div class="cabinet left">
                    <p class="hold2">|</p>
                </div>
                <div class="cabinet right">
                    <p class="hold2">|</p>
                </div>
                
            </div>
            <div class="cabinet inside"></div>

            <div class="cook">
                <div class="handles">
                    <div class="dial small"></div>
                    <div class="dial small"></div>
                    <div class="dial small"></div>
                    <div class="dial large"></div>
                </div>

            </div>

            <div class="storage">
                <div class="cabinet"> <p class="hold4">|</p> </div>
                <div class="drawer">

                    <div class="d"> <p class="hold3">__</p> </div>
                    <div class="d"> <p class="hold3">__</p> </div>
                </div>
            </div>

        </div>

        <div class="bin"></div>

    </div>

    <div class="controls">
        <button id="fridgeBtn"> </button>
        <button id="ovenBtn"> </button>
        <button id="stoveBtn"> </button>
    </div>

    <div class="recipe-card">
        <div class="description"></div>
        <div class="instruction"></div>
    </div>

</body>
</html>
